# Composants optionnels — stack étendue (profiles Docker Compose v2)
#
# Sécurité : les valeurs par défaut ${…:-changeme} et ${…:-db2changeme} sont des repli
# DEV LOCAL uniquement. Pour toute machine joignable sur le réseau, définir des secrets
# forts dans .env.stack (non versionné) : COBOL_EMUL_VSCODE_PASSWORD, COBOL_EMUL_DB2_PASSWORD.
#
# Exemples :
#
#   IDE web (VS Code dans le navigateur) :
#     cp .env.stack.example .env.stack
#     docker compose -f docker-compose.yml -f docker-compose.stack.yml --env-file .env.stack --profile ide up -d code-server
#     → http://localhost:8443  (mot de passe : COBOL_EMUL_VSCODE_PASSWORD)
#
#   Émulateur Hercules + shell prêt pour une conf MVS / TK4- :
#     docker compose -f docker-compose.yml -f docker-compose.stack.yml --profile hercules run --rm hercules
#     puis dans le conteneur : hercules -f /config/hercules.cnf
#
#   IBM Db2 Community (SQL embarqué — pas CICS intégré ici) :
#     docker compose -f docker-compose.yml -f docker-compose.stack.yml --env-file .env.stack --profile db2 up -d db2
#
# Combiner : --profile ide --profile db2

services:
  code-server:
    profiles: ["ide"]
    image: codercom/code-server:latest
    container_name: cobol-emul-code-server
    restart: unless-stopped
    ports:
      - "${COBOL_EMUL_CODE_PORT:-8443}:8080"
    environment:
      PASSWORD: ${COBOL_EMUL_VSCODE_PASSWORD:-changeme}
    volumes:
      - .:/home/coder/project
    working_dir: /home/coder/project
    command:
      - --auth
      - password
      - --bind-addr
      - 0.0.0.0:8080

  hercules:
    profiles: ["hercules"]
    build:
      context: ./docker/hercules
      dockerfile: Dockerfile
    image: cobol-emul-hercules:latest
    container_name: cobol-emul-hercules
    tty: true
    stdin_open: true
    volumes:
      - ./stack/hercules:/config
    ports:
      - "${COBOL_EMUL_TN3270:-3270}:3270"

  db2:
    profiles: ["db2"]
    image: ibmcom/db2:${COBOL_EMUL_DB2_TAG:-latest}
    container_name: cobol-emul-db2
    privileged: true
    restart: unless-stopped
    ports:
      - "${COBOL_EMUL_DB2_PORT:-50000}:50000"
    environment:
      LICENSE: accept
      DB2INSTANCE: db2inst1
      DB2INST1_PASSWORD: ${COBOL_EMUL_DB2_PASSWORD:-db2changeme}
      BLU: "false"
      ENABLE_ORACLE_COMPATIBILITY: "false"
      UPDATEAVAIL: "NO"
      TO_CREATE_SAMPLEDB: "false"
    volumes:
      - db2_data:/database
    mem_limit: 4g
    shm_size: 1gb

volumes:
  db2_data:
